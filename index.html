<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithm Visualizer</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <div class="app">
      <header class="app-header">
        <h1>Algorithm Visualizer</h1>
        <p>DAA | Divide and Conquer</p>
      </header>

      <main class="app-main">
        <section class="controls">
          <div class="control-row">
            <label>Algorithm</label>
            <select id="algorithmSelect">
              <option value="karatsuba">Karatsuba Multiplication</option>
              <option value="maxSubarray">Maximum Subarray</option>
            </select>
          </div>

          <div id="inputBox" class="control-row"></div>

          <div class="buttons-row">
            <button id="generateBtn">Generate Tree</button>
          </div>

          <div class="buttons-row">
            <button id="prevStepBtn">Previous</button>
            <button id="nextStepBtn">Next</button>
            <button id="resetBtn">Reset</button>
          </div>

          <div class="step-counter" id="stepCounter"></div>

          <div id="complexityBox" class="complexity-box"></div>
        </section>

        <section class="visual-section">
          <div id="visualWrapper" class="visual-wrapper">
            <svg id="treeSvg"></svg>
          </div>
        </section>
      </main>

      <footer class="app-footer">DAA Project | Algorithm Visualizer</footer>
    </div>

    <script src="js/algorithms.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
