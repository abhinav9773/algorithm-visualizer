<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Recursion Tree Visualizer</title>
    <link rel="stylesheet" href="css/main.css" />

    <!-- html2canvas + jsPDF for export -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Recursion Tree Visualizer</h1>
        <p>Karatsuba &amp; Max Subarray</p>
      </header>

      <main class="app-main">
        <section class="controls">
          <div class="control-row">
            <label for="algorithmSelect">Algorithm:</label>
            <select id="algorithmSelect">
              <option value="karatsuba">Karatsuba Multiplication</option>
              <option value="maxSubarray">
                Max Subarray (Divide &amp; Conquer)
              </option>
            </select>
          </div>

          <div class="control-row">
            <label for="depthInput">Recursion depth (levels):</label>
            <input id="depthInput" type="number" min="1" max="8" value="4" />
          </div>

          <div class="buttons-row">
            <button id="generateBtn">Generate Tree</button>
            <button id="prevStepBtn">◀ Prev</button>
            <button id="nextStepBtn">Next ▶</button>
            <button id="resetBtn">Reset</button>
          </div>

          <div class="buttons-row">
            <button id="exportPngBtn">Export PNG</button>
            <button id="exportPdfBtn">Export PDF</button>
          </div>

          <div id="complexityBox" class="complexity-box">
            <!-- Filled by JS -->
          </div>
        </section>

        <section class="visual-section">
          <div id="visualWrapper" class="visual-wrapper">
            <svg id="treeSvg" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <small>DAA Project – Recursion Tree Visualizer</small>
      </footer>
    </div>

    <script src="js/algorithms.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
