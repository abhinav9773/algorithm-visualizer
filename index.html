<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithm Visualizer</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <div class="app">
      <header class="app-header">
        <h1>Algorithm Visualizer</h1>
        <p>DAA | Divide and Conquer</p>
      </header>

      <main class="app-main">
        <section class="controls">
          <!-- Algorithm Picker -->
          <div class="control-row">
            <label>Algorithm</label>
            <div class="algo-picker" id="algorithmPicker">
              <div class="algo-card selected" data-value="karatsuba">
                <div class="algo-icon algo-icon--k">✕</div>
                <div class="algo-meta">
                  <div class="algo-name">Karatsuba Multiplication</div>
                  <!-- <div class="algo-sub">O(n^1.585) · Divide &amp; Conquer</div> -->
                </div>
                <!-- <span class="algo-badge algo-badge--k">3 subproblems</span> -->
                <div class="algo-check">
                  <div class="algo-check-inner"></div>
                </div>
              </div>
              <div class="algo-card" data-value="maxSubarray">
                <div class="algo-icon algo-icon--m">▦</div>
                <div class="algo-meta">
                  <div class="algo-name">Maximum Subarray</div>
                  <!-- <div class="algo-sub">O(n log n) · Divide &amp; Conquer</div> -->
                </div>
                <!-- <span class="algo-badge algo-badge--m">cross + halves</span> -->
                <div class="algo-check">
                  <div class="algo-check-inner"></div>
                </div>
              </div>
            </div>
          </div>

          <div id="inputBox" class="control-row"></div>

          <div class="buttons-row">
            <button id="generateBtn">Generate Tree</button>
          </div>

          <div class="buttons-row">
            <button id="prevStepBtn">Previous</button>
            <button id="nextStepBtn">Next</button>
            <button id="resetBtn">Reset</button>
          </div>

          <div class="step-counter" id="stepCounter"></div>

          <!-- Step Calculation Info Box -->
          <div class="step-info-box empty" id="stepInfoBox">
            <span>Generate a tree to see step details</span>
          </div>

          <!-- View Code Button -->
          <div class="buttons-row">
            <button id="codeBtn">View Code / Pseudocode</button>
          </div>

          <div id="complexityBox" class="complexity-box"></div>
        </section>

        <section class="visual-section">
          <div id="visualWrapper" class="visual-wrapper">
            <svg id="treeSvg"></svg>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <div>--Made by Aayan and Abhinav</div>
      </footer>
    </div>

    <!-- Code / Pseudocode Modal -->
    <div class="modal-overlay" id="codeModal">
      <div class="modal-box">
        <div class="modal-header">
          <h2 id="modalTitle">Karatsuba Multiplication</h2>
          <div class="modal-tabs">
            <button class="modal-tab active" data-tab="pseudo">
              Pseudocode
            </button>
            <button class="modal-tab" data-tab="java">Java</button>
            <button class="modal-tab" data-tab="cpp">C++</button>
          </div>
          <button class="modal-close" id="closeModal">✕ Close</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <script src="js/algorithms.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
